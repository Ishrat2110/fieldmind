<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNL Research Farm Manager</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0000;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Ambient background glow */
  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 60%, rgba(208,0,0,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 20%, rgba(208,0,0,0.08) 0%, transparent 60%);
    animation: glowPulse 6s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.8; }
    50%       { opacity: 1.0; }
  }

  /* Subtle grid */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(208,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(208,0,0,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Main container */
  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 0;
  }

  /* UNL Logo */
  .logo-wrap {
    opacity: 0;
    transform: scale(0.88);
    animation: logoIn 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }
  @keyframes logoIn {
    to { opacity: 1; transform: scale(1); }
  }

  .unl-logo {
    width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 40px rgba(255,80,80,0.5)) drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    margin-bottom: 32px;
  }
  .unl-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* Divider line */
  .divider {
    width: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(208,0,0,0.6), transparent);
    margin: 0 auto 32px;
    animation: lineGrow 0.8s ease 1.1s forwards;
  }
  @keyframes lineGrow {
    to { width: 320px; }
  }

  /* Main title */
  .title {
    font-size: 2.6rem; font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1.1;
    opacity: 0; transform: translateY(24px);
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.0s forwards;
    margin-bottom: 14px;
  }
  .title span { color: #ff6b6b; }

  /* Subtitle */
  .subtitle {
    font-size: 1.05rem; font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.01em;
    line-height: 1.6;
    max-width: 420px;
    opacity: 0; transform: translateY(20px);
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
    margin-bottom: 48px;
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Enter button */
  .btn-wrap {
    opacity: 0; transform: translateY(16px);
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: #D00000;
    color: white; text-decoration: none;
    font-size: 1rem; font-weight: 600;
    padding: 16px 40px;
    border-radius: 100px;
    border: 1px solid rgba(255,107,107,0.2);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 4px 24px rgba(208,0,0,0.4), 0 0 0 0 rgba(255,120,120,0);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    border-radius: 100px;
  }
  .btn:hover {
    background: #b00000;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 40px rgba(208,0,0,0.6), 0 0 0 4px rgba(255,107,107,0.1);
  }
  .btn:active {
    transform: translateY(0) scale(0.99);
  }
  .btn-arrow {
    font-size: 1.1rem;
    transition: transform 0.3s;
  }
  .btn:hover .btn-arrow { transform: translateX(4px); }

  /* Stats row */
  .stats {
    display: flex; gap: 40px;
    margin-top: 56px;
    opacity: 0;
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.8s forwards;
  }
  .stat {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .stat-num {
    font-size: 1.5rem; font-weight: 700; color: #ff6b6b;
    letter-spacing: -0.03em;
  }
  .stat-label {
    font-size: 0.72rem; color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .stat-sep {
    width: 1px; background: rgba(255,255,255,0.08);
    height: 36px; margin-top: 8px;
  }

  /* Footer */
  .footer {
    position: fixed; bottom: 28px;
    font-size: 0.72rem; color: rgba(255,255,255,0.2);
    letter-spacing: 0.06em;
    opacity: 0;
    animation: slideUp 0.9s ease 2.2s forwards;
  }

  /* Transition overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #1a0000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* Floating particles */
  .particle {
    position: fixed; border-radius: 50%;
    background: rgba(255,107,107,0.15);
    animation: float linear infinite;
    pointer-events: none; z-index: 1;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="overlay" id="overlay"></div>

<!-- Floating particles -->
<div id="particles"></div>

<div class="container">

  <div class="logo-wrap">
    <div class="unl-logo">
      <img src="Nebraska_N_RGB.svg" alt="UNL"/>
    </div>
  </div>

  <div class="divider"></div>

  <h1 class="title">Research Farm<br/><span>Manager</span></h1>

  <p class="subtitle">
    AI-powered inventory and prediction system for<br/>
    University of Nebraska–Lincoln field research operations.
  </p>

  <div class="btn-wrap">
    <a class="btn" onclick="launch()">
      Enter Dashboard
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">16</div>
      <div class="stat-label">Active Plots</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">8</div>
      <div class="stat-label">Crop Varieties</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">40</div>
      <div class="stat-label">Treatment Plans</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">AI</div>
      <div class="stat-label">Powered</div>
    </div>
  </div>

</div>

<div class="footer">UNIVERSITY OF NEBRASKA–LINCOLN · BIOLOGICAL SYSTEMS ENGINEERING · 2025</div>

<script>
  // Launch with fade transition
  function launch() {
    const overlay = document.getElementById('overlay');
    overlay.style.background = '#1a0000';
    overlay.classList.add('active');
    setTimeout(() => {
      window.location.href = 'http://localhost:8501';
    }, 650);
  }

  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${Math.random() * 0.4 + 0.1};
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
